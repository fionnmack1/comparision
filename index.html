<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BootDeal - Find the Cheapest Football Boots</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<header class="bg-black text-white p-4 flex justify-between items-center">

<h1 class="text-2xl font-bold">BootDeal ⚽</h1>

<input
id="searchInput"
placeholder="Search boots..."
class="text-black px-4 py-2 rounded"
/>

</header>


<section class="text-center py-10">

<h1 class="text-4xl font-bold mb-3">
Find The Cheapest Football Boots
</h1>

<p class="text-gray-600">
Compare prices from multiple stores
</p>

</section>


<div class="max-w-7xl mx-auto px-4">

<!-- AI SECTION -->

<div class="bg-white p-6 rounded shadow mb-8">

<h2 class="text-2xl font-bold mb-4">
🤖 BootDeal AI
</h2>

<input
id="aiQuestion"
placeholder="Example: best boots for a winger under €200"
class="border p-3 w-full rounded mb-3"
/>

<button
onclick="askAI()"
class="bg-black text-white px-4 py-2 rounded"
>
Ask AI
</button>

<p id="aiResponse" class="mt-4 text-gray-700"></p>

</div>


<!-- FILTERS -->

<div class="flex gap-3 mb-6 flex-wrap">

<button onclick="filterBrand('all')" class="bg-black text-white px-4 py-2 rounded">
All
</button>

<button onclick="filterBrand('Nike')" class="bg-white px-4 py-2 rounded shadow">
Nike
</button>

<button onclick="filterBrand('Adidas')" class="bg-white px-4 py-2 rounded shadow">
Adidas
</button>

<button onclick="filterBrand('Puma')" class="bg-white px-4 py-2 rounded shadow">
Puma
</button>

<button onclick="filterBrand('New Balance')" class="bg-white px-4 py-2 rounded shadow">
New Balance
</button>

</div>


<!-- TOP DEALS -->

<div class="bg-white p-6 rounded shadow mb-10">

<h2 class="text-2xl font-bold mb-4">
🔥 Top Deals Today
</h2>

<div id="topDeals" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>

</div>


<h2 class="text-2xl font-bold mb-6">
Popular Boots
</h2>

<div id="bootGrid" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10"></div>


<h2 class="text-2xl font-bold mb-4">
Best Deals
</h2>

<table class="w-full bg-white rounded shadow">

<tr class="bg-gray-200">
<th class="p-3">Boot</th>
<th>Store</th>
<th>Price</th>
<th></th>
</tr>

<tbody id="dealTable"></tbody>

</table>

</div>


<script>


const boots = [

{
brand:"Nike",
model:"Mercurial Vapor 15",
image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519",
prices:[
{store:"Nike",price:260,link:"#"},
{store:"SportsDirect",price:229,link:"#"},
{store:"ProDirect",price:235,link:"#"}
]
},

{
brand:"Nike",
model:"Phantom GX Elite",
image:"https://images.unsplash.com/photo-1528701800489-20be9cba7d66",
prices:[
{store:"Nike",price:255,link:"#"},
{store:"SportsDirect",price:219,link:"#"},
{store:"ProDirect",price:229,link:"#"}
]
},

{
brand:"Adidas",
model:"Predator Elite",
image:"https://images.unsplash.com/photo-1608231387042-66d1773070a5",
prices:[
{store:"Adidas",price:250,link:"#"},
{store:"SportsDirect",price:220,link:"#"},
{store:"ProDirect",price:230,link:"#"}
]
},

{
brand:"Adidas",
model:"X Crazyfast",
image:"https://images.unsplash.com/photo-1606813902914-390b5c36d8d2",
prices:[
{store:"Adidas",price:240,link:"#"},
{store:"SportsDirect",price:210,link:"#"},
{store:"ProDirect",price:215,link:"#"}
]
},

{
brand:"Puma",
model:"Future 7 Ultimate",
image:"https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa/global/107599/01/sv01/fnd/PNA/fmt/png",
prices:[
{store:"Puma",price:240,link:"#"},
{store:"SportsDirect",price:210,link:"#"},
{store:"ProDirect",price:225,link:"#"}
]
},

{
brand:"Puma",
model:"Ultra Ultimate",
image:"https://images.unsplash.com/photo-1608231387042-66d1773070a5",
prices:[
{store:"Puma",price:230,link:"#"},
{store:"SportsDirect",price:199,link:"#"},
{store:"ProDirect",price:205,link:"#"}
]
},

{
brand:"New Balance",
model:"Furon v7",
image:"https://images.unsplash.com/photo-1519741497674-611481863552",
prices:[
{store:"NewBalance",price:220,link:"#"},
{store:"SportsDirect",price:199,link:"#"},
{store:"ProDirect",price:205,link:"#"}
]
}

]


const grid = document.getElementById("bootGrid")
const table = document.getElementById("dealTable")
const topDeals = document.getElementById("topDeals")


function getCheapest(boot){

let cheapest = boot.prices[0]

boot.prices.forEach(p=>{

if(p.price < cheapest.price){

cheapest = p

}

})

return cheapest

}


function renderBoots(list){

grid.innerHTML=""

list.forEach((boot,index)=>{

const cheapest = getCheapest(boot)

const card = document.createElement("div")

card.className="bg-white p-4 rounded shadow hover:shadow-lg transition"

card.innerHTML=`

<img src="${boot.image}" class="w-full mb-3 rounded">

<h3 class="font-bold text-lg">${boot.model}</h3>

<p class="text-gray-500">${boot.brand}</p>

<p class="text-green-600 font-bold mt-2">
🔥 From €${cheapest.price}
</p>

<button
onclick="showDeals(${index})"
class="bg-green-500 text-white px-4 py-2 mt-3 rounded w-full"
>
Find Best Deal
</button>

`

grid.appendChild(card)

})

}


function renderTopDeals(){

topDeals.innerHTML=""

boots
.sort((a,b)=>getCheapest(a).price - getCheapest(b).price)
.slice(0,4)
.forEach(boot=>{

const cheapest = getCheapest(boot)

const card = document.createElement("div")

card.className="bg-gray-100 p-4 rounded"

card.innerHTML=`

<h3 class="font-bold">${boot.model}</h3>

<p class="text-green-600 font-bold">
🔥 €${cheapest.price}
</p>

`

topDeals.appendChild(card)

})

}


function showDeals(index){

table.innerHTML=""

const boot = boots[index]

const cheapest = getCheapest(boot)

boot.prices.forEach(p=>{

const row = document.createElement("tr")

row.innerHTML=`

<td class="p-3">${boot.model}</td>

<td>${p.store}</td>

<td class="${p.price===cheapest.price ? 'text-green-600 font-bold' : ''}">
€${p.price}
</td>

<td>
<a href="${p.link}" target="_blank">
<button class="bg-black text-white px-3 py-1 rounded">
Buy
</button>
</a>
</td>

`

table.appendChild(row)

})

}


function filterBrand(brand){

if(brand==="all"){

renderBoots(boots)

return

}

const filtered = boots.filter(b=>b.brand===brand)

renderBoots(filtered)

}


document.getElementById("searchInput").addEventListener("keyup",function(){

const search = this.value.toLowerCase()

const filtered = boots.filter(b =>

b.model.toLowerCase().includes(search) ||

b.brand.toLowerCase().includes(search)

)

renderBoots(filtered)

})


async function askAI(){

const question = document.getElementById("aiQuestion").value

const response = document.getElementById("aiResponse")

response.innerText="Thinking..."

response.innerText =
"For now this is a demo AI response. Example recommendation: Mercurial Vapor 15, Predator Elite, or Puma Ultra Ultimate."

}


renderBoots(boots)

renderTopDeals()


</script>

</body>
</html>
