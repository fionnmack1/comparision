<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boot Details</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fa;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.boot-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

.best{
color:green;
font-weight:bold;
}

button{
background:green;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0b8f0b;
}

</style>
</head>

<body>

<div class="container">

<div class="boot-box">

<h1 id="bootName"></h1>

<table id="priceTable">

<tr>
<th>Store</th>
<th>Price</th>
<th>Deal</th>
<th></th>
</tr>

</table>

</div>

</div>

<script>

const boots={
  

{
brand: "Nike",
model: "Mercurial Superfly 9",
price: "£210"
},

{
brand: "Adidas",
model: "Predator Elite",
price: "£200"
},

{
brand: "Puma",
model: "Future Ultimate",
price: "£190"
},

{
brand: "Nike",
model: "Phantom GX",
price: "£195"
},

{
brand: "Adidas",
model: "X Crazyfast",
price: "£180"
}

]


"mercurial":[
{store:"Nike",price:260,link:"#"},
{store:"SportsDirect",price:229,link:"#"},
{store:"ProDirect",price:235,link:"#"}
],

"predator":[
{store:"Adidas",price:250,link:"#"},
{store:"SportsDirect",price:220,link:"#"},
{store:"ProDirect",price:230,link:"#"}
]

}

const params = new URLSearchParams(window.location.search)

const boot = params.get("boot")

const table = document.getElementById("priceTable")

document.getElementById("bootName").innerText = boot

let cheapest = boots[boot][0]

boots[boot].forEach(p=>{
if(p.price < cheapest.price){
cheapest = p
}
})

boots[boot].forEach(p=>{

const row=document.createElement("tr")

row.innerHTML=`

<td>${p.store}</td>

<td ${p.price===cheapest.price ? 'class="best"' : ""}>€${p.price}</td>

<td>${p.price===cheapest.price ? "Best Deal 🔥" : ""}</td>

<td><button>Buy</button></td>

`

table.appendChild(row)

})

</script>

</body>
</html>
