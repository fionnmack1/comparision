<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BootDeal - Find the Cheapest Football Boots</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<header class="bg-black text-white p-4 flex justify-between items-center">

<h1 class="text-xl font-bold">BootDeal ⚽</h1>

<input 
type="text"
placeholder="Search football boots..."
id="searchInput"
class="text-black px-3 py-2 rounded"
/>

</header>

<section class="bg-white py-12 text-center">

<h2 class="text-3xl font-bold mb-3">
Find the Cheapest Football Boots
</h2>

<p class="text-gray-600">
Compare prices from multiple stores and get the best deal.
</p>

</section>

<div class="max-w-6xl mx-auto p-6">

<h2 class="text-2xl font-bold mb-6">Popular Boots</h2>

<div id="bootGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

<div class="mt-12">

<h2 class="text-2xl font-bold mb-4">Best Deals</h2>

<table id="compareTable" class="w-full bg-white shadow rounded">

<tr class="bg-gray-200">
<th class="p-2">Boot</th>
<th class="p-2">Store</th>
<th class="p-2">Price</th>
<th class="p-2">Deal</th>
</tr>

</table>

</div>

</div>

<script>

const boots = [

{
brand:"Nike",
model:"Mercurial Vapor 15",
image:"https://via.placeholder.com/300x200",
prices:[
{store:"Nike",price:260},
{store:"SportsDirect",price:229},
{store:"ProDirect",price:235}
]
},

{
brand:"Adidas",
model:"Predator Elite",
image:"https://via.placeholder.com/300x200",
prices:[
{store:"Adidas",price:250},
{store:"SportsDirect",price:220},
{store:"ProDirect",price:230}
]
},

{
brand:"Puma",
model:"Future 7 Ultimate",
image:"https://via.placeholder.com/300x200",
prices:[
{store:"Puma",price:240},
{store:"SportsDirect",price:210},
{store:"ProDirect",price:225}
]
},

{
brand:"New Balance",
model:"Furon v7",
image:"https://via.placeholder.com/300x200",
prices:[
{store:"New Balance",price:220},
{store:"SportsDirect",price:199},
{store:"ProDirect",price:205}
]
}

]

const grid = document.getElementById("bootGrid")
const table = document.getElementById("compareTable")
const searchInput = document.getElementById("searchInput")

function displayBoots(list){

grid.innerHTML=""

list.forEach((boot,index)=>{

let cheapest = boot.prices[0]

boot.prices.forEach(p=>{
if(p.price < cheapest.price){
cheapest = p
}
})

const card = document.createElement("div")

card.className = "bg-white rounded shadow p-4"

card.innerHTML = `

<img src="${boot.image}" class="rounded mb-3">

<h3 class="text-lg font-bold">${boot.model}</h3>

<p class="text-gray-600">${boot.brand}</p>

<p class="font-bold mt-2">From €${cheapest.price}</p>

<button 
onclick="showDeals(${index})"
class="mt-3 bg-green-500 text-white px-4 py-2 rounded w-full"
>
Find Best Deal
</button>

`

grid.appendChild(card)

})

}

displayBoots(boots)

function showDeals(index){

table.innerHTML = `
<tr class="bg-gray-200">
<th class="p-2">Boot</th>
<th class="p-2">Store</th>
<th class="p-2">Price</th>
<th class="p-2">Deal</th>
</tr>
`

const boot = boots[index]

let cheapest = boot.prices[0]

boot.prices.forEach(p=>{
if(p.price < cheapest.price){
cheapest = p
}
})

boot.prices.forEach(p=>{

const row = document.createElement("tr")

row.innerHTML = `

<td class="p-2">${boot.model}</td>

<td class="p-2">${p.store}</td>

<td class="p-2 ${p.price===cheapest.price ? 'font-bold text-green-600' : ''}">
€${p.price}
</td>

<td class="p-2">
${p.price===cheapest.price ? "Best Deal 🔥" : ""}
</td>

`

table.appendChild(row)

})

}

searchInput.addEventListener("keyup",function(){

const search = searchInput.value.toLowerCase()

const filtered = boots.filter(boot =>
boot.model.toLowerCase().includes(search) ||
boot.brand.toLowerCase().includes(search)
)

displayBoots(filtered)

})

</script>

</body>
</html>
