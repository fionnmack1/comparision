<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BootDeal – Find the Cheapest Football Boots</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<header class="bg-black text-white p-4 flex justify-between items-center">

<h1 class="text-2xl font-bold">BootDeal ⚽</h1>

<input
id="searchInput"
placeholder="Search boots..."
class="text-black px-4 py-2 rounded"
/>

</header>

<section class="text-center py-10">

<h1 class="text-4xl font-bold mb-3">
Find The Cheapest Football Boots
</h1>

<p class="text-gray-600">
Compare prices from multiple stores
</p>

</section>

<div class="max-w-7xl mx-auto px-4">

<!-- AI BOX -->

<div class="bg-white p-6 rounded shadow mb-10">

<h2 class="text-xl font-bold mb-3">
🤖 BootDeal AI
</h2>

<input
id="aiInput"
placeholder="Example: best boots for a winger under €200"
class="border p-3 rounded w-full mb-3"
/>

<button
onclick="askAI()"
class="bg-black text-white px-4 py-2 rounded"

>

Ask AI </button>

<p id="aiResponse" class="mt-3 text-gray-600"></p>

</div>

<!-- FILTERS -->

<div class="flex gap-3 mb-6 flex-wrap">

<button onclick="filterBrand('all')" class="bg-black text-white px-4 py-2 rounded">
All
</button>

<button onclick="filterBrand('Nike')" class="bg-white px-4 py-2 rounded shadow">
Nike
</button>

<button onclick="filterBrand('Adidas')" class="bg-white px-4 py-2 rounded shadow">
Adidas
</button>

<button onclick="filterBrand('Puma')" class="bg-white px-4 py-2 rounded shadow">
Puma
</button>

<button onclick="filterBrand('New Balance')" class="bg-white px-4 py-2 rounded shadow">
New Balance
</button>

</div>

<!-- TOP DEALS -->

<div class="bg-white p-6 rounded shadow mb-10">

<h2 class="text-2xl font-bold mb-4">
🔥 Top Deals Today
</h2>

<div id="topDeals" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

</div>

<h2 class="text-2xl font-bold mb-6">
Popular Boots
</h2>

<div id="bootGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10"></div>

<h2 class="text-2xl font-bold mb-4">
Best Deals
</h2>

<table class="w-full bg-white rounded shadow">

<tr class="bg-gray-200">
<th class="p-3">Boot</th>
<th>Store</th>
<th>Price</th>
<th></th>
</tr>

<tbody id="dealTable"></tbody>

</table>

</div>

<script>


const brands = [
"Nike",
"Adidas",
"Puma",
"New Balance"
]


const models = [
"Mercurial Vapor",
"Phantom GX",
"Predator Elite",
"X Crazyfast",
"Future Ultimate",
"Ultra Speed",
"Furon Pro",
"Tiempo Legend"
]


let boots = []


function generateBoots(){

for(let i=0;i<40;i++){

const brand = brands[Math.floor(Math.random()*brands.length)]

const model = models[Math.floor(Math.random()*models.length)]

const price1 = Math.floor(Math.random()*80)+180
const price2 = price1 - Math.floor(Math.random()*40)
const price3 = price2 + Math.floor(Math.random()*20)

boots.push({

brand:brand,

model:model+" "+(i+1),

image:"https://images.unsplash.com/photo-1519741497674-611481863552",

prices:[

{store:"SportsDirect",price:price1,link:"#"},
{store:"ProDirect",price:price2,link:"#"},
{store:"Nike",price:price3,link:"#"}]

})

}

}


generateBoots()


const grid = document.getElementById("bootGrid")
const table = document.getElementById("dealTable")
const topDeals = document.getElementById("topDeals")


function getCheapest(boot){

let cheapest = boot.prices[0]

boot.prices.forEach(p=>{

if(p.price < cheapest.price){

cheapest = p

}

})

return cheapest

}


function renderBoots(list){

grid.innerHTML=""

list.forEach((boot,index)=>{

const cheapest = getCheapest(boot)

const card = document.createElement("div")

card.className="bg-white p-4 rounded shadow hover:shadow-lg transition"

card.innerHTML=`

<img src="${boot.image}" class="w-full mb-2 rounded">

<h3 class="font-bold">${boot.model}</h3>

<p class="text-gray-500">${boot.brand}</p>

<p class="text-green-600 font-bold">
From €${cheapest.price}
</p>

<button
onclick="showDeals(${index})"
class="bg-green-500 text-white px-3 py-1 rounded w-full mt-2">
Find Deals
</button>

`

grid.appendChild(card)

})

}


function renderTopDeals(){

topDeals.innerHTML=""

boots
.sort((a,b)=>getCheapest(a).price-getCheapest(b).price)
.slice(0,4)
.forEach(boot=>{

const cheapest = getCheapest(boot)

const div = document.createElement("div")

div.className="bg-gray-100 p-4 rounded"

div.innerHTML=`

<strong>${boot.model}</strong>
<br>
€${cheapest.price}

`

topDeals.appendChild(div)

})

}


function showDeals(index){

table.innerHTML=""

const boot = boots[index]

const cheapest = getCheapest(boot)

boot.prices.forEach(p=>{

const row = document.createElement("tr")

row.innerHTML=`

<td class="p-2">${boot.model}</td>
<td>${p.store}</td>

<td class="${p.price===cheapest.price?'text-green-600 font-bold':''}">
€${p.price}
</td>

<td>
<button class="bg-black text-white px-2 py-1 rounded">
Buy
</button>
</td>

`

table.appendChild(row)

})

}


function filterBrand(brand){

if(brand==="all"){

renderBoots(boots)
return

}

const filtered = boots.filter(b=>b.brand===brand)

renderBoots(filtered)

}


document.getElementById("searchInput").addEventListener("keyup",function(){

const search = this.value.toLowerCase()

const filtered = boots.filter(b=>

b.model.toLowerCase().includes(search) ||

b.brand.toLowerCase().includes(search)

)

renderBoots(filtered)

})


function askAI(){

const q = document.getElementById("aiInput").value

document.getElementById("aiResponse").innerText =
"Recommended: Mercurial Vapor, Predator Elite, or Puma Ultra based on speed and budget."

}


renderBoots(boots)

renderTopDeals()


</script>

</body>
</html>
