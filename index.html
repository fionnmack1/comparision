<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.tailwindcss.com"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BootDeal</title>
</head>

<body class="bg-gray-100">

<header class="bg-black text-white p-4 flex justify-between">
<h1 class="text-xl font-bold">BootDeal ⚽</h1>

<input
id="searchInput"
placeholder="Search boots..."
class="text-black px-3 py-2 rounded"
/>
</header>

<section class="text-center py-12">
<h1 class="text-4xl font-bold mb-3">
Find The Cheapest Football Boots
</h1>

<p class="text-gray-600">
Compare prices from multiple stores
</p>
</section>

<div class="max-w-6xl mx-auto px-4">

<h2 class="text-2xl font-bold mb-6">Popular Boots</h2>

<div
id="bootGrid"
class="grid grid-cols-1 md:grid-cols-3 gap-6"
></div>

<h2 class="text-2xl font-bold mt-12 mb-4">
Best Deals
</h2>

<table class="w-full bg-white rounded shadow">

<tr class="bg-gray-200">
<th class="p-3">Boot</th>
<th>Store</th>
<th>Price</th>
<th>Deal</th>
</tr>

<tbody id="dealTable"></tbody>

</table>

</div>

<script>

const boots = [

{
brand:"Nike",
image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"
prices:[
{store:"Nike",price:260,link:"#"},
{store:"SportsDirect",price:229,link:"#"},
{store:"ProDirect",price:235,link:"#"}
]
},

{
brand:"Adidas",
model:"Predator Elite",
image:"https://assets.adidas.com/images/h_840,f_auto,q_auto,fl_lossy,c_fill,g_auto/predator-elite-fg-boots.png",
prices:[
{store:"Adidas",price:250,link:"#"},
{store:"SportsDirect",price:220,link:"#"},
{store:"ProDirect",price:230,link:"#"}
]
},

{
brand:"Puma",
model:"Future 7 Ultimate",
image:"https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa/global/107599/01/sv01/fnd/PNA/fmt/png",
prices:[
{store:"Puma",price:240,link:"#"},
{store:"SportsDirect",price:210,link:"#"},
{store:"ProDirect",price:225,link:"#"}
]
}

]

const grid = document.getElementById("bootGrid")
const table = document.getElementById("dealTable")

function renderBoots(list){

grid.innerHTML=""

list.forEach((boot,index)=>{

let cheapest = boot.prices[0]

boot.prices.forEach(p=>{
if(p.price < cheapest.price){
cheapest = p
}
})

const card = document.createElement("div")

card.className="bg-white p-4 rounded shadow"

card.innerHTML=`

<img src="${boot.image}" class="w-full mb-3">

<h3 class="text-lg font-bold">${boot.model}</h3>

<p class="text-gray-500">${boot.brand}</p>

<p class="font-bold text-green-600 mt-2">
🔥 From €${cheapest.price}
</p>

<button
onclick="showDeals(${index})"
class="bg-green-500 text-white px-4 py-2 mt-3 rounded w-full"
>
Find Best Deal
</button>

`

grid.appendChild(card)

})

}

function showDeals(index){

table.innerHTML=""

const boot = boots[index]

let cheapest = boot.prices[0]

boot.prices.forEach(p=>{
if(p.price < cheapest.price){
cheapest = p
}
})

boot.prices.forEach(p=>{

const row = document.createElement("tr")

row.innerHTML=`

<td class="p-3">${boot.model}</td>

<td>${p.store}</td>

<td class="${p.price===cheapest.price ? 'text-green-600 font-bold' : ''}">
€${p.price}
</td>

<td>
<a href="${p.link}" target="_blank">
<button class="bg-black text-white px-3 py-1 rounded">
Buy
</button>
</a>
</td>

`

table.appendChild(row)

})

}

renderBoots(boots)

const searchInput = document.getElementById("searchInput")

searchInput.addEventListener("keyup",function(){

const search = searchInput.value.toLowerCase()

const filtered = boots.filter(boot =>
boot.model.toLowerCase().includes(search) ||
boot.brand.toLowerCase().includes(search)
)

renderBoots(filtered)

})

</script>

</body>
</html>
